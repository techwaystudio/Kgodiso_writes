<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Kgodiso Writes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    @media (min-width: 768px) {
      .cart-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <div class="container header-container">
        <div class="logo-link"><img src="logo.png" class="logo-image" alt="Kgodiso Writes logo"></div>
        <nav class="desktop-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="books.html" class="nav-link">Books</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </nav>
        <div class="nav-actions">
          <button class="mobile-menu-btn" aria-label="Toggle Menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg></button>
          <div class="action-buttons">
            <a href="cart.html" class="icon-btn cart-btn" aria-label="Shopping Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
              <span class="cart-badge">0</span>
            </a>
            <button class="btn btn-outline login-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" x2="3" y1="12" y2="12"></line></svg>
              <span>Login</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content" style="padding: 4rem 0;">
      <div class="container cart-layout" style="max-width: 1100px;">
        <div id="cart-container">
          <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 2rem;">Shopping Cart</h1>
          <div id="cart-items-list" style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 2rem;">
            <!-- Rendered via JS -->
          </div>
          <div id="empty-cart-message" style="display: none; text-align: center; padding: 4rem 0; color: var(--muted-foreground);">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 1rem; opacity: 0.5;"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
            <h2>Your cart is empty</h2>
            <a href="books.html" class="btn btn-primary" style="margin-top: 1rem;">Continue Shopping</a>
          </div>
        </div>

        <div class="summary-card" id="cart-summary" style="display: none; align-self: start;">
          <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">R0.00</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span id="cart-delivery">R60.00</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="cart-total">R0.00</span>
          </div>
          <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 2rem; justify-content: center; font-size: 1rem;">
            Proceed to Checkout
          </a>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
