<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Kgodiso Writes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    @media (min-width: 768px) {
      .checkout-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <div class="container header-container">
        <a href="index.html" class="logo-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M16 8.2A2.22 2.22 0 0 0 13.8 6c-.8 0-1.4.3-1.8.9-.4-.6-1-.9-1.8-.9A2.22 2.22 0 0 0 8 8.2c0 .6.3 1.2.7 1.6A226.652 226.652 0 0 0 12 13a404 404 0 0 0 3.3-3.1 2.413 2.413 0 0 0 .7-1.7"></path><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"></path></svg>
          <span class="logo-text">Kgodiso Writes</span>
        </a>
        <nav class="desktop-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="books.html" class="nav-link">Books</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </nav>
        <div class="nav-actions">
          <button class="mobile-menu-btn" aria-label="Toggle Menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg></button>
          <div class="action-buttons">
            <a href="cart.html" class="icon-btn cart-btn" aria-label="Shopping Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
              <span class="cart-badge">0</span>
            </a>
            <button class="btn btn-outline login-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" x2="3" y1="12" y2="12"></line></svg>
              <span>Login</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content" style="padding: 4rem 0;">
      <div class="container checkout-layout" style="max-width: 1100px;">
        <div id="payment-form-container">
          <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 2rem;">Payment</h1>
          <div class="summary-card" style="padding: 2.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">PayFast Payment</h2>
            <form id="payment-form" action="https://www.payfast.co.za/eng/process" method="POST">
              <input type="hidden" name="merchant_id" value="30532281">
              <input type="hidden" name="merchant_key" value="drvf86on8bn3w">
              <input type="hidden" name="item_name" value="Kgodiso Writes Order">
              <input type="hidden" name="amount" id="payfast-amount" value="0.00">
              <input type="hidden" name="return_url" id="payfast-return-url" value="index.html">
              <input type="hidden" name="cancel_url" id="payfast-cancel-url" value="payment.html">
              <input type="hidden" name="notify_url" id="payfast-notify-url" value="index.html">
              <input type="hidden" name="email_address" id="payfast-email-address" value="">
              <input type="hidden" name="custom_str1" id="payfast-custom" value="">

              <div class="form-group">
                <label class="form-label" for="payerEmail">Email Address</label>
                <input type="email" id="payerEmail" name="payerEmail" class="form-control" required placeholder="you@example.com">
              </div>
              <div class="form-group">
                <label class="form-label" for="payerName">Name</label>
                <input type="text" id="payerName" class="form-control" required placeholder="Jane Doe">
              </div>
              <p style="color: var(--muted-foreground); margin-top: 1rem;">You will be redirected to PayFast to complete your payment.</p>
              <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; justify-content: center; font-size: 1rem; padding: 1rem;">
                Pay with PayFast
              </button>
            </form>
          </div>
        </div>

        <div class="summary-card" id="payment-summary" style="align-self: start;">
          <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="payment-subtotal">R0.00</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span>R60.00</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="payment-total">R0.00</span>
          </div>
        </div>
      </div>
    </main>

    <!-- Payment Success Modal -->
    <div class="payment-modal" id="success-modal">
      <div class="modal-content">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="success-icon"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Payment Successful!</h2>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Thank you for your order. We've emailed you the receipt.</p>
        <a href="index.html" class="btn btn-primary" style="width: 100%; justify-content: center;">Return to Home</a>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
