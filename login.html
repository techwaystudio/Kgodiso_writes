<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kgodiso Writes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <div class="container header-container">
        <div class="logo-link"><img src="logo.png" class="logo-image" alt="Kgodiso Writes logo"></div>
        <nav class="desktop-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="books.html" class="nav-link">Books</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </nav>
        <div class="nav-actions">
          <button class="mobile-menu-btn" aria-label="Toggle Menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg></button>
          <div class="action-buttons">
            <a href="cart.html" class="icon-btn cart-btn" aria-label="Shopping Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
              <span class="cart-badge">0</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content" style="padding: 4rem 0; display: flex; align-items: center; justify-content: center;">
      <div class="container" style="max-width: 480px; width: 100%;">
        <div class="summary-card" style="padding: 3rem;">
          <h1 class="hero-title" style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Welcome Back</h1>
          <form id="login-form">
            <div class="form-group">
              <label class="form-label" for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" class="form-control" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label class="form-label" for="loginPassword">Password</label>
              <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center; font-size: 1rem; padding: 1rem;">
              Sign In
            </button>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--muted-foreground);">
              Don't have an account? <a href="#" style="color: var(--primary); font-weight: 500;">Sign up</a>
            </p>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
