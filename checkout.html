<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Kgodiso Writes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    @media (min-width: 768px) {
      .checkout-layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <div class="container header-container">
        <div class="logo-link"><img src="logo.png" class="logo-image" alt="Kgodiso Writes logo"></div>
        <nav class="desktop-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="books.html" class="nav-link">Books</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </nav>
        <div class="nav-actions">
          <button class="mobile-menu-btn" aria-label="Toggle Menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg></button>
          <div class="action-buttons">
            <a href="cart.html" class="icon-btn cart-btn" aria-label="Shopping Cart">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
              <span class="cart-badge">0</span>
            </a>
            <button class="btn btn-outline login-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" x2="3" y1="12" y2="12"></line></svg>
              <span>Login</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content" style="padding: 4rem 0;">
      <div class="container checkout-layout" style="max-width: 1100px;">
        <div id="checkout-form-container">
          <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 2rem;">Checkout</h1>
          <div class="summary-card" style="padding: 2.5rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Shipping Details</h2>
            <form id="checkout-form" action="payment.html">
              <div class="form-group">
                <label class="form-label" for="fullName">Full Names</label>
                <input type="text" id="fullName" class="form-control" required placeholder="Jane Doe">
              </div>
              <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-control" required placeholder="+27 12 345 6789">
              </div>
              <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="jane@example.com">
              </div>
              <div class="form-group">
                <label class="form-label" for="address">Street Address</label>
                <input type="text" id="address" class="form-control" required placeholder="123 Main St">
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                  <label class="form-label" for="city">City</label>
                  <input type="text" id="city" class="form-control" required placeholder="Johannesburg">
                </div>
                <div class="form-group">
                  <label class="form-label" for="zip">Postal Code</label>
                  <input type="text" id="zip" class="form-control" required placeholder="2000">
                </div>
              </div>
              
              <h2 style="font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1.5rem; border-top: 1px solid var(--border); padding-top: 2rem;">Delivery Method</h2>
              <div style="border: 1px solid var(--primary); border-radius: var(--radius); padding: 1.25rem; display: flex; align-items: center; justify-content: space-between; background: var(--accent);">
                <div style="display: flex; align-items: center; gap: 1rem;">
                  <input type="radio" id="delivery-standard" name="delivery" checked style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary);">
                  <div>
                    <label for="delivery-standard" style="font-weight: 600; display: block; cursor: pointer;">Standard Delivery</label>
                    <span style="color: var(--muted-foreground); font-size: 0.875rem;">3-5 business days</span>
                  </div>
                </div>
                <span style="font-weight: 600;" id="delivery-price">R60.00</span>
              </div>

              <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; justify-content: center; font-size: 1rem; padding: 1rem;">
                Continue to Payment
              </button>
            </form>
          </div>
        </div>

        <div class="summary-card" id="checkout-summary" style="align-self: start;">
          <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Order Summary</h3>
          <div id="checkout-items" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
            <!-- JS inserted items -->
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="checkout-subtotal">R0.00</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span id="checkout-delivery">R60.00</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="checkout-total">R0.00</span>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
